    <div id="modalForm" class="fixed inset-0 z-[2000] bg-slate-900/90 backdrop-blur-sm hidden items-center justify-center p-6">

                <input id="formVal1" type="text" placeholder="Nama Lengkap" class="w-full p-4 bg-slate-50 rounded-xl text-sm font-bold border-none outline-none focus:ring-2 ring-red-600/10">
                <input id="formVal2" type="text" placeholder="PIN / Jabatan" class="w-full p-4 bg-slate-50 rounded-xl text-sm font-bold border-none outline-none focus:ring-2 ring-red-600/10">

                <button id="btnSave" class="flex-1 bg-red-700 text-white py-4 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-red-700/20 active:scale-95 transition-all">Simpan</button>

    <div id="modalFinish" class="fixed inset-0 z-[2000] bg-slate-950/90 backdrop-blur-md hidden items-center justify-center p-6">

            <div id="step-location" class="space-y-4">

                <p class="text-[10px] font-bold text-slate-400 mb-6 uppercase tracking-widest leading-relaxed">Pastikan Anda berada di dalam area SMK Link and Match.</p>
                <button onclick="verifyLocation()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black text-[10px] uppercase shadow-lg shadow-blue-600/20 active:scale-95 transition-all">Verifikasi Lokasi</button>
            </div>

            <div id="step-camera" class="hidden space-y-4">
                <h3 class="text-lg font-black uppercase tracking-tight text-slate-800 mb-2">Selfie Bukti</h3>

                    <video id="cameraVideo" class="w-full h-full object-cover" autoplay playsinline></video>
                </div>
                <button onclick="takePhoto()" class="w-full py-4 mt-2 bg-indigo-600 text-white rounded-xl font-black text-[10px] uppercase shadow-lg shadow-indigo-600/20 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-camera"></i> Ambil Gambar
                </button>
            </div>

            <div id="step-preview" class="hidden space-y-4">

                <div class="w-full aspect-[9/16] rounded-2xl overflow-hidden shadow-inner border border-slate-200 bg-slate-100 ring-4 ring-slate-100">
                    <img id="previewImg" class="w-full h-full object-cover" />
                </div>
                <div class="flex gap-2 mt-2">
                    <button onclick="retakePhoto()" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-xl font-black text-[10px] uppercase active:scale-95 transition-all">Ulangi</button>
                    <button onclick="submitFinish()" class="flex-1 py-4 bg-emerald-600 text-white rounded-xl font-black text-[10px] uppercase shadow-lg shadow-emerald-600/20 active:scale-95 transition-all">Simpan & Selesai</button>
                </div>
            </div>
            
            <button onclick="closeFinishModal()" class="w-full mt-6 text-slate-400 py-2 font-bold text-[10px] uppercase hover:text-slate-600 transition-all">Batal</button>

    <script>
        /* =========================================================
           KONFIGURASI NAMA TABEL SUPABASE 
           Silakan ubah nama-nama ini jika berbeda di database Anda
        ========================================================= */
        const TBL_PEGAWAI = "pegawai";        // Contoh lain: "data_pegawai"
        const TBL_PETUGAS = "petugas";        // Contoh lain: "data_petugas"
        const TBL_IZIN    = "izin";           // Contoh lain: "izin_keluar"
        
        const ADMIN_PASS  = "lm9595";         // Password Master Admin

        // --- CONFIG SUPABASE ---
        const SB_URL = "https://isgzhypglpxjirjrnvnf.supabase.co";
        const SB_KEY = "sb_publishable_r5PbD3I5xBPwFCOpoOvnSg_gY8e3nIx";
        let supabaseClient = null;
        if (window.supabase && SB_URL && SB_KEY) {
            supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);
        }

        // --- CONFIG SEKOLAH ---
        const SCHOOL_LAT = -6.35749271145112; 
        const SCHOOL_LNG = 106.75074803106442;
        const ALLOWED_RADIUS = 100; 

        // --- STATE MANAGEMENT ---
        let state = {
            activeTab: 'layanan',
            adminActiveTab: 'pegawai',
            dataIzin: [],
            listPegawai: [],
            listPetugas: [],
            currentUser: null,
            isAdmin: false,
            currentFinishId: null,
            cameraStream: null
        };

        // Format waktu agar paksa 24 jam meskipun di iOS
        function formatTo24Hour(timeStr) {
            if(!timeStr) return "00:00";
            let t = timeStr.replace('.', ':');
            let parts = t.split(':');
            if(parts.length >= 2) {
                let h = parts[0].padStart(2, '0');
                let m = parts[1].padStart(2, '0');
                return `${h}:${m}`;
            }
            return timeStr;
        }

        async function init() {
            if (!supabaseClient) { alert("Sistem Error: Konfigurasi Supabase salah."); return; }
            showLoading("Memuat Data...");
            await Promise.all([fetchPegawai(), fetchPetugas(), fetchIzin()]);
            hideLoading();
            updateTime();
            setInterval(updateTime, 1000);
        }

        // --- DATABASE OPERATIONS ---
        async function fetchPegawai() {
            const { data, error } = await supabaseClient.from(TBL_PEGAWAI).select('*').order('nama', { ascending: true });
            if (error) {
                console.error("Error get Pegawai:", error.message);
                // Jika error, pastikan nama tabel benar atau matikan fitur RLS di Supabase.
            } else {
                state.listPegawai = data || [];
                syncSelects();
                if(state.isAdmin && state.adminActiveTab === 'pegawai') renderAdminContent();
            }
        }

        async function fetchPetugas() {
            const { data, error } = await supabaseClient.from(TBL_PETUGAS).select('*').order('nama', { ascending: true });
            if (error) {
                console.error("Error get Petugas:", error.message);
            } else {
                state.listPetugas = data || [];
                syncSelects();
                if(state.isAdmin && state.adminActiveTab === 'petugas') renderAdminContent();
            }
        }

        async function fetchIzin() {
            const { data, error } = await supabaseClient.from(TBL_IZIN).select('*').neq('status', 'Selesai').order('created_at', { ascending: false });
            if (error) {
                console.error("Error get Izin:", error.message);
            } else {
                state.dataIzin = data || [];
                renderUserList();
                renderPiketAntrean();
            }
        }

        async function handleIzinSubmit(e) {
            e.preventDefault();
            const idx = document.getElementById('inputNama').value;
            if (idx === "" || !state.listPegawai[idx]) return alert("Silakan pilih nama terlebih dahulu");

            showLoading("Mengirim Pengajuan...");
            const peg = state.listPegawai[idx];
            const reqId = 'LP-' + Math.floor(1000 + Math.random() * 9000);
            const now = new Date();
            const rawJam = now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit', hour12:false});

            const { error } = await supabaseClient.from(TBL_IZIN).insert([{
                id_izin: reqId,
                nama: peg.nama,
                keperluan: document.getElementById('inputKategori').value,
                tujuan: document.getElementById('inputTujuan').value,
                waktu_daftar: formatTo24Hour(rawJam),
                status: 'Menunggu',
                tanggal: now.toLocaleDateString('id-ID')
            }]);

            if (!error) { 
                e.target.reset(); 
                await fetchIzin(); 
                alert("Pengajuan berhasil dikirim!");
            } else {
                console.error("Error Insert Izin:", error);
                alert("Gagal mengajukan izin. Cek console browser.");
            }
            hideLoading();
        }

        async function approveIzin(id) {
            showLoading("Mengonfirmasi...");
            const rawJam = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false });
            const jamFormat = formatTo24Hour(rawJam);
            const { error } = await supabaseClient.from(TBL_IZIN).update({ 
                status: 'Keluar', 
                petugas_piket: state.currentUser.nama, 
                waktu_keluar: jamFormat 
            }).eq('id_izin', id);
            
            if(!error) await fetchIzin();
            hideLoading();
        }

        // --- ADMIN OPERATIONS ---
        async function saveMasterData(type, v1, v2) {
            showLoading("Menyimpan...");
            const table = type === 'pegawai' ? TBL_PEGAWAI : TBL_PETUGAS;
            const payload = type === 'pegawai' ? { nama: v1, jabatan: v2 } : { nama: v1, pin: v2 };
            const { error } = await supabaseClient.from(table).insert([payload]);
            if (!error) { 
                type === 'pegawai' ? await fetchPegawai() : await fetchPetugas(); 
                closeForm(); 
            } else {
                alert("Gagal menyimpan data!");
                console.error("Save Data Error:", error);
            }
            hideLoading();
        }

        async function deleteMasterData(type, id) {
            if (!confirm("Hapus data ini secara permanen?")) return;
            showLoading("Menghapus...");
            const table = type === 'pegawai' ? TBL_PEGAWAI : TBL_PETUGAS;
            const { error } = await supabaseClient.from(table).delete().eq('id', id);
            if (!error) {
                if (type === 'pegawai') await fetchPegawai();
                else await fetchPetugas();
            }
            hideLoading();
        }

        // --- REPORTING GENERATOR (PDF & CSV) ---
        async function generateReport(format) {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            if (!startDate || !endDate) { alert("Tentukan rentang tanggal terlebih dahulu!"); return; }
            
            showLoading(`Menyiapkan Laporan ${format.toUpperCase()}...`);
            
            // Ambil data dari Supabase berdasarkan range tanggal
            const { data, error } = await supabaseClient.from(TBL_IZIN)
                .select('*')
                .gte('created_at', new Date(startDate).toISOString())
                .lte('created_at', new Date(endDate + 'T23:59:59').toISOString())
                .order('created_at', { ascending: false });

            if (error || !data || data.length === 0) {
                hideLoading();
                alert("Data tidak ditemukan atau terjadi error.");
                return;
            }

            if (format === 'csv') {
                let csv = "ID,Nama,Keperluan,Tujuan,Waktu Daftar,Keluar,Kembali,Petugas,Status,Bukti\n";
                data.forEach(r => { 
                    csv += `"${r.id_izin}","${r.nama}","${r.keperluan}","${r.tujuan}","${r.waktu_daftar || '-'}","${r.waktu_keluar || '-'}","${r.waktu_kembali || '-'}","${r.petugas_piket || '-'}","${r.status}","${r.foto_url || '-'}"\n`; 
                });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `Laporan_Izin_${startDate}.csv`; a.click();
            } 
            else if (format === 'pdf') {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'landscape' });
                
                doc.setFont("helvetica", "bold");
                doc.setFontSize(16);
                doc.text("Laporan Izin Keluar Pegawai", 14, 15);
                doc.setFontSize(10);
                doc.setFont("helvetica", "normal");
                doc.text(`Periode: ${startDate} s/d ${endDate}`, 14, 22);

                const tableData = data.map((r, i) => [
                    i + 1, r.nama, r.keperluan, r.tujuan, 
                    `${r.waktu_keluar || '-'} - ${r.waktu_kembali || '-'}`, 
                    r.petugas_piket || '-', r.status
                ]);

                doc.autoTable({
                    startY: 28,
                    head: [['No', 'Nama Pegawai', 'Kategori', 'Tujuan', 'Jam Keluar - Kembali', 'Petugas', 'Status']],
                    body: tableData,
                    theme: 'grid',
                    headStyles: { fillColor: [185, 28, 28] }, // Red Tailwind
                    styles: { fontSize: 8, cellPadding: 3 }
                });

                doc.save(`Laporan_Izin_${startDate}.pdf`);
            }
            hideLoading();
        }

        // --- UI RENDERING ---
        function navTo(sec) {
            ['layanan', 'piket', 'admin'].forEach(s => {
                document.getElementById(`sec-${s}`).classList.add('hidden');
                document.getElementById(`nav-${s}`).classList.replace('text-red-600', 'text-slate-400');
            });
            document.getElementById(`sec-${sec}`).classList.remove('hidden');
            document.getElementById(`nav-${sec}`).classList.replace('text-slate-400', 'text-red-600');
            if(sec === 'admin' && state.isAdmin) renderAdminContent();
        }

        function syncSelects() {
            const sP = document.getElementById('inputNama');
            const sT = document.getElementById('piketUser');
            if (sP) {
                sP.innerHTML = '<option value="">Pilih Nama Anda...</option>';
                state.listPegawai.forEach((p, i) => { sP.innerHTML += `<option value="${i}">${p.nama}</option>`; });
            }
            if (sT) {
                sT.innerHTML = '<option value="">Pilih Petugas...</option>';
                state.listPetugas.forEach((p) => { sT.innerHTML += `<option value="${p.nama}">${p.nama}</option>`; });
            }
        }

        function renderUserList() {
            const container = document.getElementById('listAntrean');
            const activeData = state.dataIzin;
            if(activeData.length === 0) {
                container.innerHTML = '<div class="p-10 text-center text-[9px] font-black text-slate-300 uppercase border-2 border-dashed border-slate-200 rounded-[2rem]">Belum Ada Pengajuan</div>';
                return;
            }
            container.innerHTML = '';
            activeData.forEach(item => {
                container.innerHTML += `
                    <div class="p-5 bg-white border border-slate-100 rounded-3xl flex justify-between items-center animate-slide-up shadow-sm">
                        <div class="truncate pr-4">
                            <div class="text-xs font-black uppercase truncate">${item.nama}</div>
                            <div class="text-[8px] font-bold text-red-600 uppercase mt-1">${item.keperluan}: ${item.tujuan}</div>
                        </div>
                        <div>
                            ${item.status === 'Menunggu' ? 
                                '<span class="text-[7px] font-black uppercase px-3 py-1.5 bg-amber-50 text-amber-600 rounded-xl whitespace-nowrap"><i class="fas fa-clock mr-1"></i> Waiting</span>' : 
                                `<button onclick="openFinish('${item.id_izin}')" class="text-[8px] font-black uppercase px-4 py-2 bg-emerald-600 shadow-lg shadow-emerald-600/20 text-white rounded-xl active:scale-95 transition-all"><i class="fas fa-camera mr-1"></i> Lapor</button>`}
                        </div>
                    </div>
                `;
            });
        }

        function renderPiketAntrean() {
            const container = document.getElementById('antreanPiket');
            const waiting = state.dataIzin.filter(i => i.status === 'Menunggu');
            if(waiting.length === 0){
                container.innerHTML = '<div class="p-10 text-center text-[9px] font-black text-slate-400 uppercase bg-slate-50 rounded-3xl">TIDAK ADA ANTREAN</div>';
                return;
            }
            container.innerHTML = '';
            waiting.forEach(item => {
                container.innerHTML += `
                    <div class="p-5 bg-white border border-slate-200 rounded-3xl space-y-4 shadow-sm relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-16 h-16 bg-red-50 rounded-bl-[100%] z-0"></div>
                        <div class="relative z-10">
                            <div class="text-[9px] text-slate-400 font-bold uppercase mb-1">ID: ${item.id_izin}</div>
                            <div class="text-sm font-black uppercase">${item.nama}</div>
                            <div class="text-[10px] font-bold text-red-600 mt-1">${item.keperluan} - ${item.tujuan}</div>
                        </div>
                        <button onclick="approveIzin('${item.id_izin}')" class="w-full py-3 bg-slate-900 text-white rounded-xl text-[9px] font-black uppercase shadow-lg shadow-slate-900/20 active:scale-95 transition-all relative z-10">Izinkan Keluar Sklh</button>
                    </div>
                `;
            });
        }

        function handleLogin() {
            const user = document.getElementById('piketUser').value;
            const pin = document.getElementById('piketPin').value;
            const match = state.listPetugas.find(p => p.nama === user && p.pin === pin);
            if (match) {
                state.currentUser = match;
                document.getElementById('piketLogin').classList.add('hidden');
                document.getElementById('piketDashboard').classList.remove('hidden');
                document.getElementById('petugasAktif').textContent = match.nama;
                renderPiketAntrean();
            } else { alert("PIN Petugas Salah atau Tidak Ditemukan!"); }
        }
        function handleLogout() {
            state.currentUser = null;
            document.getElementById('piketPin').value = "";
            document.getElementById('piketDashboard').classList.add('hidden');
            document.getElementById('piketLogin').classList.remove('hidden');
        }

        function handleAdminLogin() {
            if (document.getElementById('adminPass').value === ADMIN_PASS) {
                state.isAdmin = true;
                document.getElementById('adminLogin').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
                switchAdminTab('pegawai');
            } else { alert("Password Master Salah!"); }
        }
        function handleAdminLogout() {
            state.isAdmin = false;
            document.getElementById('adminPass').value = "";
            document.getElementById('adminDashboard').classList.add('hidden');
            document.getElementById('adminLogin').classList.remove('hidden');
        }

        function switchAdminTab(tab) {
            state.adminActiveTab = tab;
            ['pegawai', 'petugas', 'laporan'].forEach(t => {
                const btn = document.getElementById(`tabBtn-${t}`);
                btn.className = (t === tab) ? "flex-none px-4 py-3 bg-slate-900 text-white rounded-lg text-[9px] font-black uppercase tracking-widest shadow-md shadow-slate-900/20" : "flex-none px-4 py-3 text-slate-400 rounded-lg text-[9px] font-black uppercase tracking-widest";
            });
            renderAdminContent();
        }

        function renderAdminContent() {
            const container = document.getElementById('adminContent');
            if (state.adminActiveTab === 'laporan') {
                container.innerHTML = `
                    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-5">
                        <div class="text-center">
                            <h4 class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Pilih Periode</h4>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="text-[8px] font-bold text-slate-500 uppercase ml-1">Dari Tanggal</label>
                                <input type="date" id="startDate" class="w-full p-4 bg-slate-50 rounded-xl text-xs font-bold outline-none focus:ring-2 ring-slate-900/10 border-none">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[8px] font-bold text-slate-500 uppercase ml-1">Sampai Tanggal</label>
                                <input type="date" id="endDate" class="w-full p-4 bg-slate-50 rounded-xl text-xs font-bold outline-none focus:ring-2 ring-slate-900/10 border-none">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3 pt-2">
                            <button onclick="generateReport('pdf')" class="w-full py-4 bg-red-600 text-white rounded-xl text-[10px] font-black uppercase shadow-lg shadow-red-600/20 active:scale-95 transition-all"><i class="fas fa-file-pdf mr-1"></i> Cetak PDF</button>
                            <button onclick="generateReport('csv')" class="w-full py-4 bg-emerald-600 text-white rounded-xl text-[10px] font-black uppercase shadow-lg shadow-emerald-600/20 active:scale-95 transition-all"><i class="fas fa-file-excel mr-1"></i> Data CSV</button>
                        </div>
                    </div>
                `;
                return;
            }
            const source = state.adminActiveTab === 'pegawai' ? state.listPegawai : state.listPetugas;
            const btnLabel = state.adminActiveTab === 'pegawai' ? "+ Tambah Pegawai" : "+ Tambah Petugas";
            
            container.innerHTML = `
                <button onclick="openForm('${state.adminActiveTab}')" class="w-full py-4 bg-white border-2 border-dashed border-slate-300 text-slate-500 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:border-slate-900 hover:text-slate-900 transition-all">${btnLabel}</button>
                <div class="space-y-2 max-h-[50vh] overflow-y-auto hide-scroll pb-10">
                    ${source.map(item => `
                        <div class="flex justify-between items-center p-4 bg-white rounded-2xl border border-slate-100 shadow-sm animate-slide-up">
                            <div class="truncate pr-2">
                                <div class="text-xs font-black uppercase truncate">${item.nama}</div>
                                <div class="text-[9px] font-bold text-slate-400 mt-0.5">${state.adminActiveTab === 'pegawai' ? item.jabatan || '-' : 'PIN: ' + item.pin}</div>
                            </div>
                            <button onclick="deleteMasterData('${state.adminActiveTab}', ${item.id})" class="w-8 h-8 rounded-full bg-red-50 text-red-600 flex items-center justify-center shrink-0"><i class="fas fa-trash text-[10px]"></i></button>
                        </div>
                    `).join('')}
                    ${source.length === 0 ? '<div class="text-center text-[10px] font-bold text-slate-400 py-5">Tabel Kosong</div>' : ''}
                </div>
            `;
        }

        // --- CAMERA & GEOFENCING ---
        function openFinish(id) { 
            state.currentFinishId = id; 
            document.getElementById('modalFinish').classList.replace('hidden', 'flex');
            document.getElementById('step-location').classList.remove('hidden');
            document.getElementById('step-camera').classList.add('hidden');
            document.getElementById('step-preview').classList.add('hidden'); 
        }

        function verifyLocation() {
            showLoading("Mencari Sinyal GPS...");
            if(!navigator.geolocation) {
                hideLoading();
                alert("Browser tidak mendukung lokasi.");
                return;
            }
            navigator.geolocation.getCurrentPosition((pos) => {
                const dist = getDistanceFromLatLonInM(SCHOOL_LAT, SCHOOL_LNG, pos.coords.latitude, pos.coords.longitude);
                hideLoading();
                if (dist <= ALLOWED_RADIUS) {
                    document.getElementById('step-location').classList.add('hidden');
                    document.getElementById('step-camera').classList.remove('hidden');
                    startCamera();
                } else { alert(`Gagal! Jarak Anda terlalu jauh (${Math.round(dist)} meter dari sekolah)`); }
            }, (err) => { 
                hideLoading(); 
                alert("Gagal mengakses lokasi. Pastikan GPS aktif dan diizinkan browser."); 
                console.error(err);
            }, { enableHighAccuracy: true, timeout: 10000 });
        }

        async function startCamera() {
            try {
                state.cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                document.getElementById('cameraVideo').srcObject = state.cameraStream;
            } catch(e) {
                alert("Gagal akses kamera.");
                console.error(e);
            }
        }

        function takePhoto() {
            const v = document.getElementById('cameraVideo');
            const c = document.getElementById('photoCanvas');
            c.width = 720; c.height = 1280; // Aspect Ratio 16:9 Potrait
            const ctx = c.getContext('2d');
            
            // Draw Video
            ctx.drawImage(v, 0, 0, 720, 1280);
            
            // Draw Watermark Background
            ctx.fillStyle = "rgba(0,0,0,0.6)"; 
            ctx.fillRect(0, 1100, 720, 180);
            
            // Draw Text
            ctx.fillStyle = "white"; 
            ctx.textBaseline = "top";
            
            ctx.font = "bold 32px 'Plus Jakarta Sans', Arial";
            ctx.fillText("SMK LINK AND MATCH", 40, 1130);
            
            ctx.font = "bold 22px 'Plus Jakarta Sans', Arial";
            ctx.fillStyle = "#f87171"; // Red-400
            ctx.fillText(`Akurasi GPS: Sesuai (Radius < ${ALLOWED_RADIUS}m)`, 40, 1175);
            
            ctx.fillStyle = "#cbd5e1"; // Slate-300
            ctx.font = "bold 20px 'Plus Jakarta Sans', Arial";
            const now = new Date();
            const dateStr = now.toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
            const timeStr = now.toLocaleTimeString('id-ID');
            ctx.fillText(`${dateStr} | ${timeStr}`, 40, 1215);

            document.getElementById('previewImg').src = c.toDataURL('image/jpeg', 0.8);
            document.getElementById('step-camera').classList.add('hidden');
            document.getElementById('step-preview').classList.remove('hidden');
            
            if(state.cameraStream) state.cameraStream.getTracks().forEach(t => t.stop());
        }

        function retakePhoto() {
            document.getElementById('step-preview').classList.add('hidden');
            document.getElementById('step-camera').classList.remove('hidden');
            startCamera();
        }

        async function submitFinish() {
            showLoading("Menyimpan Laporan...");
            const targetId = state.currentFinishId;
            const rawJam = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false });
            const jamFormat = formatTo24Hour(rawJam);
            
            // Base64 to Blob untuk Storage (Optional: Jika tabel storage sudah dikonfigurasi)
            // Di sini kita update status terlebih dahulu agar UI cepat respons
            const { error } = await supabaseClient.from(TBL_IZIN).update({ 
                status: 'Selesai', 
                waktu_kembali: jamFormat 
                // foto_url: (jika menggunakan bucket storage)
            }).eq('id_izin', targetId);
            
            hideLoading();
            if(!error) {
                alert("Kehadiran Berhasil Diverifikasi!");
                closeFinishModal();
                fetchIzin();
            } else { 
                console.error("Finish Error:", error);
                alert("Terjadi kesalahan jaringan."); 
            }
        }

        // --- HELPER FUNCTIONS ---
        function openForm(type) {
            document.getElementById('modalTitle').textContent = `Tambah ${type}`;
            document.getElementById('modalForm').classList.replace('hidden', 'flex');
            document.getElementById('btnSave').onclick = () => {
                const v1 = document.getElementById('formVal1').value;
                const v2 = document.getElementById('formVal2').value;
                if(v1 && v2) saveMasterData(type, v1, v2);
            };
        }
        function closeForm() { 
            document.getElementById('modalForm').classList.replace('flex', 'hidden'); 
            document.getElementById('formVal1').value = "";
            document.getElementById('formVal2').value = "";
        }
        function closeFinishModal() { 
            if(state.cameraStream) state.cameraStream.getTracks().forEach(t=>t.stop());
            document.getElementById('modalFinish').classList.replace('flex', 'hidden'); 
        }
        function updateTime() {
            const now = new Date();
            const cd = document.getElementById('clockDisplay');
            const dd = document.getElementById('dateDisplay');
            const rawTime = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false });
            if(cd) cd.textContent = formatTo24Hour(rawTime);
            if(dd) dd.textContent = now.toLocaleDateString('id-ID', { weekday: 'short', day: 'numeric', month: 'short' }).toUpperCase();
        }
        function showLoading(txt) { 
            const el = document.getElementById('loadingText');
            if(el) el.textContent = txt; 
            document.getElementById('loadingOverlay').classList.remove('hidden'); 
        }
        function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }
        function getDistanceFromLatLonInM(lat1, lon1, lat2, lon2) {
            const R = 6371000; const dLat = (lat2-lat1)*Math.PI/180; const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // PWA SERVICE WORKER REGISTRATION
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then((reg) => console.log('Service Worker terdaftar!', reg))
                .catch((err) => console.error('Service Worker gagal terdaftar', err));
            });
        }

        window.onload = init;
        document.getElementById('izinForm').onsubmit = handleIzinSubmit;
    </script>
</body>
</html>
