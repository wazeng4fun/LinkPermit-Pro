<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinkPermit Pro</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1162/1162456.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .hide-scroll::-webkit-scrollbar { display: none; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body class="text-slate-900 antialiased">

    <div id="loadingOverlay" class="fixed inset-0 z-[9999] bg-white/95 backdrop-blur-md hidden flex flex-col items-center justify-center">
        <div class="w-10 h-10 border-4 border-slate-100 border-t-red-600 rounded-full animate-spin mb-4"></div>
        <p id="loadingText" class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-400">Sinkronisasi Data</p>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 z-[1000] px-4 py-2 safe-area-bottom shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto flex justify-around items-center">
            <button onclick="navTo('layanan')" id="nav-layanan" class="flex flex-col items-center gap-1 p-2 text-red-600">
                <i class="fas fa-home-alt text-lg"></i>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Beranda</span>
            </button>
            <button onclick="navTo('piket')" id="nav-piket" class="flex flex-col items-center gap-1 p-2 text-slate-400">
                <i class="fas fa-user-shield text-lg"></i>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Piket</span>
            </button>
            <button onclick="navTo('admin')" id="nav-admin" class="flex flex-col items-center gap-1 p-2 text-slate-400">
                <i class="fas fa-cog text-lg"></i>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Admin</span>
            </button>
        </div>
    </nav>

    <header class="sticky top-0 bg-white/80 backdrop-blur-md z-[900] px-6 py-4 border-b border-slate-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-red-700 rounded-lg flex items-center justify-center text-white shadow-lg shadow-red-700/20">
                    <i class="fas fa-id-card text-xs"></i>
                </div>
                <h1 class="text-sm font-black tracking-tighter uppercase">LinkPermit <span class="text-red-700">Pro</span></h1>
            </div>
            <div class="text-right">
                <div id="clockDisplay" class="text-xs font-black">00:00</div>
                <div id="dateDisplay" class="text-[7px] font-bold text-slate-400 uppercase tracking-widest">LOADING...</div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-5 pb-24">
        <div id="sec-layanan" class="animate-slide-up space-y-6">
            <div class="bg-slate-900 rounded-[2rem] p-6 text-white relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-lg font-black leading-tight mb-1">Pengajuan Izin</h2>
                    <p class="text-[9px] font-medium text-slate-400 uppercase tracking-widest">SMK Link and Match</p>
                </div>
                <i class="fas fa-cloud absolute -right-2 -bottom-2 text-6xl text-white/5"></i>
            </div>

            <form id="izinForm" class="space-y-4">
                <div class="space-y-2">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest px-1">Nama Pegawai</label>
                    <select id="inputNama" required class="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-sm shadow-sm outline-none focus:border-red-600 transition-all text-slate-700">
                        <option value="">Memuat data pegawai...</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest px-1">Kategori</label>
                        <select id="inputKategori" required class="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-sm shadow-sm outline-none text-slate-700">
                            <option value="Dinas/Sekolah">Dinas/Sekolah</option>
                            <option value="Pribadi">Pribadi</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest px-1">Keperluan</label>
                        <input id="inputTujuan" type="text" placeholder="..." required class="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-sm shadow-sm outline-none text-slate-700">
                    </div>
                </div>
                <button type="submit" class="w-full bg-red-700 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl active:scale-95 transition-all">
                    Kirim Permohonan <i class="fas fa-paper-plane ml-2"></i>
                </button>
            </form>
        </div>

        </main>

    <script>
        // --- CONFIG SUPABASE ---
        const SB_URL = "https://isgzhypglpxjirjrnvnf.supabase.co";
        const SB_KEY = "sb_publishable_r5PbD3I5xBPwFCOpoOvnSg_gY8e3nIx";
        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

        let state = { dataIzin: [], listPegawai: [] };

        // --- SISTEM NOTIFIKASI PERSISTEN (MODIFIKASI UTAMA) ---
        function kirimNotifikasi(pesan) {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.ready.then(function(registration) {
                    registration.showNotification('LinkPermit Pro', {
                        body: pesan,
                        icon: 'https://cdn-icons-png.flaticon.com/512/1162/1162456.png',
                        badge: 'https://cdn-icons-png.flaticon.com/512/1162/1162456.png',
                        vibrate: [500, 110, 500, 110, 450, 110, 200, 110, 170, 40, 450, 110, 200, 110, 170, 40, 500],
                        tag: 'peringatan-izin',
                        renotify: true,
                        requireInteraction: true, // NOTIFIKASI TIDAK AKAN HILANG SAMPAI DI-SWIPE/KLIK
                        data: { url: window.location.href }
                    });
                });
            }
        }

        // Simpan Nama Pemohon saat Submit
        document.getElementById('izinForm').addEventListener('submit', function() {
            const namaSelect = document.getElementById('inputNama');
            const namaText = namaSelect.options[namaSelect.selectedIndex].text;
            localStorage.setItem('local_pemohon_pwa', namaText);
        });

        // Alarm Pengecekan (Sama seperti logika Anda, tapi memanggil kirimNotifikasi yang baru)
        function checkNotificationSchedules() {
            if (Notification.permission !== 'granted') return;
            const myName = localStorage.getItem('local_pemohon_pwa');
            const ticket = state.dataIzin.find(i => i.nama === myName && i.status === 'Keluar');
            
            if (ticket) {
                // Logika sisa waktu Anda di sini...
                // Contoh pemicu:
                kirimNotifikasi("Waktu izin Anda hampir habis! Harap segera melapor kembali.");
            }
        }

        setInterval(checkNotificationSchedules, 60000);

        // Meminta Izin Notifikasi saat App Dibuka
        function initNotifications() {
            if ('Notification' in window) {
                Notification.requestPermission();
            }
        }

        // Integrasi dengan Navigasi & UI Anda
        function navTo(section) {
            ['layanan', 'piket', 'admin'].forEach(s => {
                document.getElementById(`sec-${s}`).classList.add('hidden');
                document.getElementById(`nav-${s}`).classList.replace('text-red-600', 'text-slate-400');
            });
            document.getElementById(`sec-${section}`).classList.remove('hidden');
            document.getElementById(`nav-${section}`).classList.replace('text-slate-400', 'text-red-600');
        }

        // Clock & Start
        function updateTime() {
            const now = new Date();
            document.getElementById('clockDisplay').textContent = now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('dateDisplay').textContent = now.toLocaleDateString('id-ID', {weekday:'short', day:'numeric', month:'short'}).toUpperCase();
        }

        window.onload = () => {
            updateTime();
            setInterval(updateTime, 1000);
            initNotifications();
            // Panggil fungsi fetch data Supabase Anda di sini
        };
    </script>
</body>
</html>
