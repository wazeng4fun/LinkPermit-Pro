<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinkPermit Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="text-slate-900">

    <div id="loadingOverlay" class="fixed inset-0 z-[9999] bg-white/95 hidden flex flex-col items-center justify-center">
        <div class="w-10 h-10 border-4 border-t-red-600 rounded-full animate-spin mb-4"></div>
        <p id="loadingText" class="text-[9px] font-black uppercase text-slate-400">Sinkronisasi...</p>
    </div>

    <div id="authOverlay" class="fixed inset-0 z-[2000] bg-white hidden overflow-y-auto p-8 animate-slide-up">
        <div class="max-w-md mx-auto">
            <button onclick="closeAuth()" class="mb-8 text-slate-400"><i class="fas fa-arrow-left text-xl"></i></button>
            <h2 id="authTitle" class="text-2xl font-black mb-8 uppercase italic">Akses <span class="text-red-700">Petugas</span></h2>
            
            <div id="authTabs" class="flex bg-slate-100 p-1 rounded-2xl mb-8">
                <button id="tabLogin" onclick="toggleAuthTab('login')" class="flex-1 py-3 text-[10px] font-black uppercase rounded-xl bg-white shadow-sm">Login</button>
                <button id="tabDaftar" onclick="toggleAuthTab('daftar')" class="flex-1 py-3 text-[10px] font-black uppercase text-slate-400">Daftar</button>
            </div>

            <div id="boxLogin" class="space-y-4">
                <select id="loginNama" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm"></select>
                <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm">
                <button onclick="handleLoginPiket()" class="w-full bg-red-700 text-white py-4 rounded-2xl font-black text-[10px] uppercase shadow-xl">Masuk</button>
                <button onclick="switchAdminUI()" class="w-full text-[9px] font-black uppercase text-red-700 mt-4">Login Admin Sekolah</button>
            </div>

            <div id="boxDaftar" class="hidden space-y-4">
                <select id="regNama" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm"></select>
                <input type="password" id="regPass" placeholder="Buat Password Baru" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm">
                <button onclick="handleRegisterPiket()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase shadow-xl">Daftar Akun</button>
            </div>

            <div id="boxAdmin" class="hidden space-y-4">
                <input type="email" id="adminEmail" placeholder="Email Admin" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm">
                <input type="password" id="adminPass" placeholder="Password Admin" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm">
                <button onclick="handleLoginAdmin()" class="w-full bg-red-700 text-white py-4 rounded-2xl font-black text-[10px] uppercase shadow-xl">Akses Dashboard</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t z-[1000] px-4 py-3 shadow-lg">
        <div class="max-w-md mx-auto flex justify-around">
            <button onclick="navTo('layanan')" id="nav-layanan" class="flex flex-col items-center gap-1 text-red-600">
                <i class="fas fa-home text-lg"></i><span class="text-[9px] font-black uppercase">Beranda</span>
            </button>
            <button onclick="navTo('piket')" id="nav-piket" class="flex flex-col items-center gap-1 text-slate-400">
                <i class="fas fa-user-shield text-lg"></i><span class="text-[9px] font-black uppercase">Piket</span>
            </button>
            <button onclick="navTo('admin')" id="nav-admin" class="flex flex-col items-center gap-1 text-slate-400">
                <i class="fas fa-cog text-lg"></i><span class="text-[9px] font-black uppercase">Admin</span>
            </button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-5 pb-24">
        <div id="sec-layanan" class="animate-slide-up space-y-6">
            <div class="bg-slate-900 rounded-[2rem] p-6 text-white">
                <h1 class="text-lg font-black italic uppercase">LinkPermit Pro</h1>
                <p class="text-[8px] tracking-[0.3em] text-slate-400 uppercase">Layanan Izin Pegawai</p>
            </div>
            <form id="izinForm" class="space-y-4">
                <select id="inputNama" required class="w-full p-4 border rounded-2xl font-bold text-sm"></select>
                <input id="inputTujuan" type="text" placeholder="Keperluan Keluar" required class="w-full p-4 border rounded-2xl font-bold text-sm">
                <button type="submit" class="w-full bg-red-700 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl">Kirim Permohonan</button>
            </form>
        </div>

        <div id="sec-piket" class="hidden animate-slide-up space-y-4">
            <h2 class="text-sm font-black uppercase border-l-4 border-red-700 pl-3">Daftar Tunggu</h2>
            <div id="listPiket" class="space-y-3"></div>
        </div>

        <div id="sec-admin" class="hidden animate-slide-up space-y-4">
            <h2 class="text-sm font-black uppercase">Kelola Petugas</h2>
            <div id="listApprove" class="space-y-3"></div>
        </div>
    </main>

    <script>
        const SB_URL = "https://isgzhypglpxjirjrnvnf.supabase.co";
        const SB_KEY = "sb_publishable_r5PbD3I5xBPwFCOpoOvnSg_gY8e3nIx";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let currentSession = null;

        // LOAD DATA PEGAWAI (MENGGUNAKAN TABEL LAMA: 'pegawai')
        async function loadPegawai() {
            const { data } = await supabase.from('pegawai').select('nama').order('nama');
            const sel = document.getElementById('inputNama');
            sel.innerHTML = '<option value="">Pilih Nama...</option>';
            data?.forEach(p => sel.innerHTML += `<option value="${p.nama}">${p.nama}</option>`);
        }

        // NAVIGASI
        function navTo(s) {
            if (s === 'layanan') { renderSection(s); return; }
            if (!currentSession) { showAuth(); } else { renderSection(s); }
        }

        function renderSection(s) {
            ['layanan', 'piket', 'admin'].forEach(x => {
                document.getElementById(`sec-${x}`).classList.add('hidden');
                document.getElementById(`nav-${x}`).classList.replace('text-red-600', 'text-slate-400');
            });
            document.getElementById(`sec-${s}`).classList.remove('hidden');
            document.getElementById(`nav-${s}`).classList.replace('text-slate-400', 'text-red-600');
            if(s === 'piket') loadIzin();
        }

        // LOAD IZIN (MENGGUNAKAN TABEL LAMA: 'izin')
        async function loadIzin() {
            const { data } = await supabase.from('izin').select('*').order('created_at', {ascending: false});
            const list = document.getElementById('listPiket');
            list.innerHTML = '';
            data?.forEach(i => {
                list.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl border shadow-sm">
                        <div class="flex justify-between items-center mb-2">
                            <h4 class="font-black text-sm">${i.nama}</h4>
                            <span class="text-[8px] font-black uppercase px-2 py-1 rounded bg-slate-100">${i.status}</span>
                        </div>
                        <p class="text-[10px] text-slate-500 italic mb-3">"${i.tujuan}"</p>
                        ${i.status === 'Pending' ? `<button onclick="approve('${i.id}')" class="w-full bg-slate-900 text-white py-2 rounded-xl text-[9px] font-black uppercase">Setujui</button>` : ''}
                    </div>`;
            });
        }

        async function approve(id) {
            await supabase.from('izin').update({ status: 'Keluar' }).eq('id', id);
            loadIzin();
        }

        function showAuth() { document.getElementById('authOverlay').classList.remove('hidden'); fetchMasterPiket(); }
        function closeAuth() { document.getElementById('authOverlay').classList.add('hidden'); }
        function toggleAuthTab(t) {
            const isL = t === 'login';
            document.getElementById('boxLogin').classList.toggle('hidden', !isL);
            document.getElementById('boxDaftar').classList.toggle('hidden', isL);
        }
        function switchAdminUI() {
            document.getElementById('boxAdmin').classList.toggle('hidden');
            document.getElementById('boxLogin').classList.toggle('hidden');
        }

        async function fetchMasterPiket() {
            const { data } = await supabase.from('master_piket').select('nama_piket');
            const sels = [document.getElementById('loginNama'), document.getElementById('regNama')];
            sels.forEach(s => {
                s.innerHTML = '<option value="">Pilih Nama Petugas...</option>';
                data?.forEach(p => s.innerHTML += `<option value="${p.nama_piket}">${p.nama_piket}</option>`);
            });
        }

        async function handleLoginPiket() {
            const n = document.getElementById('loginNama').value;
            const p = document.getElementById('loginPass').value;
            const { data } = await supabase.from('users_piket').select('*').eq('nama_piket', n).eq('password', p).single();
            if(data?.is_approved) { currentSession = data; closeAuth(); navTo('piket'); } else { alert("Login Gagal/Belum Approve"); }
        }

        window.onload = loadPegawai;
    </script>
</body>
</html>
