<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinkPermit Pro | Supabase</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1162/1162456.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .hide-scroll::-webkit-scrollbar { display: none; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .modal-active { overflow: hidden; }
    </style>
</head>
<body class="text-slate-900 antialiased">

    <div id="loadingOverlay" class="fixed inset-0 z-[9999] bg-white/95 backdrop-blur-md hidden flex flex-col items-center justify-center">
        <div class="w-10 h-10 border-4 border-slate-100 border-t-red-600 rounded-full animate-spin mb-4"></div>
        <p id="loadingText" class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-400">Sinkronisasi Data</p>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 z-[1000] px-4 py-2 safe-area-bottom shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto flex justify-around items-center">
            <button onclick="navTo('layanan')" id="nav-layanan" class="flex flex-col items-center gap-1 p-2 text-red-600">
                <i class="fas fa-home-alt text-lg"></i>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Beranda</span>
            </button>
            <button onclick="navTo('piket')" id="nav-piket" class="flex flex-col items-center gap-1 p-2 text-slate-400">
                <i class="fas fa-user-shield text-lg"></i>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Piket</span>
            </button>
            <button onclick="navTo('admin')" id="nav-admin" class="flex flex-col items-center gap-1 p-2 text-slate-400">
                <i class="fas fa-cog text-lg"></i>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Admin</span>
            </button>
        </div>
    </nav>

    <header class="sticky top-0 bg-white/80 backdrop-blur-md z-[900] px-6 py-4 border-b border-slate-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-red-700 rounded-lg flex items-center justify-center text-white shadow-lg shadow-red-700/20">
                    <i class="fas fa-id-card text-xs"></i>
                </div>
                <h1 class="text-sm font-black tracking-tighter uppercase">LinkPermit <span class="text-red-700">Pro</span></h1>
            </div>
            <div class="text-right">
                <div id="clockDisplay" class="text-xs font-black">00:00</div>
                <div id="dateDisplay" class="text-[7px] font-bold text-slate-400 uppercase tracking-widest">LOADING...</div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-5 pb-24">
        
        <div id="sec-layanan" class="animate-slide-up space-y-6">
            <div class="bg-slate-900 rounded-[2rem] p-6 text-white relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-lg font-black leading-tight mb-1">Pengajuan Izin</h2>
                    <p class="text-[9px] font-medium text-slate-400 uppercase tracking-widest">Realtime Cloud Storage</p>
                </div>
                <i class="fas fa-cloud absolute -right-2 -bottom-2 text-6xl text-white/5"></i>
            </div>

            <form id="izinForm" class="space-y-4">
                <div class="space-y-2">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest px-1">Nama Pegawai</label>
                    <select id="inputNama" required class="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-sm shadow-sm outline-none focus:border-red-600 transition-all text-slate-700">
                        <option value="">Memuat data pegawai...</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest px-1">Kategori</label>
                        <select id="inputKategori" required class="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-sm shadow-sm outline-none text-slate-700">
                            <option value="Dinas/Sekolah">Dinas/Sekolah</option>
                            <option value="Pribadi">Pribadi</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest px-1">Keperluan</label>
                        <input id="inputTujuan" type="text" placeholder="..." required class="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-sm shadow-sm outline-none text-slate-700">
                    </div>
                </div>
                <button type="submit" class="w-full bg-red-700 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl active:scale-95 transition-all">
                    Kirim Permohonan <i class="fas fa-paper-plane ml-2"></i>
                </button>
            </form>

            <div class="space-y-4 pt-4 border-t border-slate-100">
                <div class="flex justify-between items-end">
                    <h3 class="font-black text-sm uppercase tracking-tight">Status Pengajuan</h3>
                    <button onclick="fetchIzin()" class="text-xs text-red-600 font-bold uppercase tracking-widest"><i class="fas fa-sync-alt mr-1"></i> Sync</button>
                </div>
                <div id="listAntrean" class="space-y-3"></div>
            </div>
        </div>

        <div id="sec-piket" class="hidden animate-slide-up space-y-6">
            <div id="piketLogin" class="space-y-6 pt-10">
                <div class="text-center">
                    <h3 class="text-xl font-black mb-2">Panel Petugas</h3>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Akses Database Pusat</p>
                </div>
                <div class="space-y-3 bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <select id="piketUser" class="w-full p-4 bg-slate-50 border-none rounded-xl font-bold text-sm outline-none text-slate-700">
                        <option value="">Pilih Petugas...</option>
                    </select>
                    <input id="piketPin" type="password" maxlength="4" placeholder="PIN" class="w-full p-4 bg-slate-50 border-none rounded-xl font-mono text-center text-2xl tracking-[1em] outline-none text-slate-700">
                </div>
                <button onclick="handleLogin()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase shadow-xl active:scale-95 transition-all">Login Petugas</button>
            </div>

            <div id="piketDashboard" class="hidden space-y-4">
                <div class="flex justify-between items-center bg-slate-900 p-4 rounded-2xl text-white">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center text-[10px]"><i class="fas fa-user-shield"></i></div>
                        <span id="petugasAktif" class="text-[10px] font-black uppercase tracking-widest">-</span>
                    </div>
                    <button onclick="handleLogout()" class="text-[9px] font-bold text-white/50 uppercase tracking-widest bg-white/10 px-3 py-1.5 rounded-lg">Logout</button>
                </div>
                <div id="cameraContainer" class="hidden w-full bg-black rounded-2xl overflow-hidden relative shadow-lg">
                    <video id="kamera" class="w-full h-auto" autoplay playsinline></video>
                    <button id="btnJepret" class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-red-600 text-white w-14 h-14 rounded-full border-4 border-white shadow-xl flex items-center justify-center active:scale-90 transition-transform">
                        <i class="fas fa-camera"></i>
                    </button>
                </div>
                <div id="antreanPiket" class="space-y-3"></div>
            </div>
        </div>

        <div id="sec-admin" class="hidden animate-slide-up space-y-6">
            <div id="adminLogin" class="space-y-6 pt-10">
                <div class="text-center">
                    <h3 class="text-xl font-black mb-2">Master Admin</h3>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Konfigurasi Cloud</p>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <input id="adminPass" type="password" placeholder="Password Admin" class="w-full p-4 bg-slate-50 border-none rounded-xl font-bold text-center outline-none text-slate-700">
                </div>
                <button onclick="handleAdminLogin()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase shadow-xl active:scale-95 transition-all">Buka Dashboard</button>
            </div>

            <div id="adminDashboard" class="hidden space-y-6">
                <div class="flex justify-between items-center bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                    <div class="flex items-center gap-2">
                        <div class="w-6 h-6 bg-slate-900 text-white rounded-md flex items-center justify-center text-[10px]"><i class="fas fa-database"></i></div>
                        <span class="text-[9px] font-black uppercase tracking-widest">Supabase Cloud</span>
                    </div>
                    <button onclick="handleAdminLogout()" class="text-[9px] font-black text-red-600 uppercase tracking-widest border border-red-100 px-3 py-1 rounded-lg bg-red-50">Logout</button>
                </div>

                <div class="flex gap-2 p-1 bg-slate-100 rounded-xl overflow-x-auto hide-scroll">
                    <button id="tabBtn-pegawai" onclick="switchAdminTab('pegawai')" class="flex-none px-4 py-3 bg-slate-900 text-white rounded-lg text-[9px] font-black uppercase tracking-widest transition-all">Pegawai</button>
                    <button id="tabBtn-petugas" onclick="switchAdminTab('petugas')" class="flex-none px-4 py-3 text-slate-400 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all">Petugas Piket</button>
                    <button id="tabBtn-laporan" onclick="switchAdminTab('laporan')" class="flex-none px-4 py-3 text-slate-400 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all">Laporan</button>
                </div>

                <div id="adminContent" class="space-y-4">
                    </div>

                <div id="adminPagination" class="flex justify-between items-center bg-white p-3 rounded-2xl border border-slate-100 shadow-sm">
                    <button id="prevPage" onclick="changePage(-1)" class="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl text-slate-400 disabled:opacity-30">
                        <i class="fas fa-chevron-left text-xs"></i>
                    </button>
                    <div class="text-center">
                        <span id="pageInfo" class="text-[9px] font-black uppercase tracking-widest text-slate-900">Halaman 1 / 1</span>
                    </div>
                    <button id="nextPage" onclick="changePage(1)" class="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl text-slate-400 disabled:opacity-30">
                        <i class="fas fa-chevron-right text-xs"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="modalForm" class="fixed inset-0 z-[2000] bg-slate-900/90 backdrop-blur-sm hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 space-y-6 scale-95 animate-slide-up">
            <h3 id="modalTitle" class="text-lg font-black uppercase tracking-tight">Tambah Data</h3>
            <div class="space-y-4">
                <input id="formVal1" type="text" placeholder="Nama Lengkap" class="w-full p-4 bg-slate-50 rounded-xl text-sm font-bold border-none outline-none focus:ring-2 ring-red-600/10 text-slate-700">
                <input id="formVal2" type="text" placeholder="PIN / Jabatan" class="w-full p-4 bg-slate-50 rounded-xl text-sm font-bold border-none outline-none focus:ring-2 ring-red-600/10 text-slate-700">
            </div>
            <div class="flex gap-3">
                <button onclick="closeForm()" class="flex-1 py-4 text-[10px] font-black uppercase text-slate-400">Batal</button>
                <button id="btnSave" class="flex-1 bg-red-700 text-white py-4 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-red-700/20">Simpan</button>
            </div>
        </div>
    </div>

    <div id="modalEditIzin" class="fixed inset-0 z-[2000] bg-slate-900/90 backdrop-blur-sm hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 space-y-4 scale-95 animate-slide-up h-auto max-h-[90vh] overflow-y-auto hide-scroll">
            <h3 class="text-lg font-black uppercase tracking-tight mb-2">Edit Data Izin</h3>
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div class="col-span-2">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Kategori</label>
                        <select id="editKategori" class="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold border-none outline-none focus:ring-2 ring-blue-600/10 text-slate-700">
                            <option value="Dinas/Sekolah">Dinas/Sekolah</option>
                            <option value="Pribadi">Pribadi</option>
                        </select>
                    </div>
                    <div class="col-span-2">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Keperluan / Tujuan</label>
                        <input id="editTujuan" type="text" class="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold border-none outline-none focus:ring-2 ring-blue-600/10 text-slate-700">
                    </div>
                    <div class="col-span-2">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Tanggal Pengajuan</label>
                        <input id="editTanggal" type="date" class="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold border-none outline-none focus:ring-2 ring-blue-600/10 text-slate-700">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Tgl Keluar</label>
                        <input id="editTanggalKeluar" type="date" class="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold border-none outline-none focus:ring-2 ring-blue-600/10 text-slate-700">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Tgl Kembali</label>
                        <input id="editTanggalKembali" type="date" class="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold border-none outline-none focus:ring-2 ring-blue-600/10 text-slate-700">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Jam Keluar (24H)</label>
                        <input id="editJamKeluar" type="time" class="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold border-none outline-none focus:ring-2 ring-blue-600/10 text-slate-700">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Jam Kembali (24H)</label>
                        <input id="editJamKembali" type="time" class="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold border-none outline-none focus:ring-2 ring-blue-600/10 text-slate-700">
                    </div>
                    <div class="col-span-2">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Status</label>
                        <select id="editStatus" class="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold border-none outline-none focus:ring-2 ring-blue-600/10 text-slate-700">
                            <option value="Menunggu">Menunggu</option>
                            <option value="Di Luar">Di Luar</option>
                            <option value="Selesai">Selesai</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="flex gap-3 pt-4 border-t border-slate-100">
                <button onclick="closeEditIzin()" class="flex-1 py-4 text-[10px] font-black uppercase text-slate-400">Batal</button>
                <button id="btnUpdateIzin" class="flex-1 bg-slate-900 text-white py-4 rounded-xl text-[10px] font-black uppercase shadow-lg">Perbarui</button>
            </div>
        </div>
    </div>

    <script>
        // Masukkan logika Supabase, navigasi, jam, dan kamera Anda di sini.
        // Bagian ini sengaja dibiarkan ringkas agar Anda tetap bisa memakai script 
        // JavaScript utama yang sudah Anda miliki (termasuk Supabase URL/Key).
        
        // Pendaftaran PWA (Service Worker Base)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker terdaftar!', reg))
                    .catch(err => console.log('Pendaftaran Service Worker gagal:', err));
            });
        }
        
        function navTo(section) {
            document.getElementById('sec-layanan').classList.add('hidden');
            document.getElementById('sec-piket').classList.add('hidden');
            document.getElementById('sec-admin').classList.add('hidden');
            
            document.getElementById('nav-layanan').classList.replace('text-red-600', 'text-slate-400');
            document.getElementById('nav-piket').classList.replace('text-red-600', 'text-slate-400');
            document.getElementById('nav-admin').classList.replace('text-red-600', 'text-slate-400');
            
            document.getElementById('sec-' + section).classList.remove('hidden');
            document.getElementById('nav-' + section).classList.replace('text-slate-400', 'text-red-600');
        }

        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace('.', ':');
            const dateString = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('clockDisplay').textContent = timeString;
            document.getElementById('dateDisplay').textContent = dateString;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>

    <script>
        // 1. Simpan nama pemohon di HP saat form disubmit
        const formPWA = document.getElementById('izinForm');
        if (formPWA) {
            formPWA.addEventListener('submit', () => {
                const namaInput = document.getElementById('inputNama');
                if (namaInput && namaInput.value) {
                    localStorage.setItem('local_pemohon_pwa', namaInput.value);
                }
                // Minta izin notifikasi saat tombol kirim ditekan
                if ('Notification' in window && Notification.permission !== 'granted') {
                    Notification.requestPermission();
                }
            });
        }

        // 2. Alarm Pengecekan Waktu (Jalan otomatis setiap 1 Menit)
        setInterval(checkNotificationSchedules, 60000);

        async function checkNotificationSchedules() {
            // Berhenti jika browser tidak dukung notif atau belum diizinkan
            if (!('Notification' in window) || Notification.permission !== 'granted') return;
            
            // Berhenti jika ini adalah HP admin/petugas (belum pernah mengajukan izin)
            const myName = localStorage.getItem('local_pemohon_pwa');
            if (!myName) return; 

            // Pastikan supabase client sudah diinisialisasi oleh script utama Anda.
            // Jika supabase belum ada, fungsi ini akan berhenti dengan sendirinya tanpa merusak UI.
            if (typeof supabase === 'undefined') return;

            try {
                // Ambil data izin yang masih "Di Luar" khusus untuk orang di HP ini
                const { data, error } = await supabase
                    .from('izin')
                    .select('*')
                    .eq('nama', myName)
                    .eq('status', 'Di Luar');
                    
                if (error || !data || data.length === 0) return; // Tidak ada izin aktif

                const now = new Date();
                const ticket = data[0]; // Cek tiket terbaru
                
                // Variabel Waktu Keberangkatan (Sesuai format DB)
                const tglKeluarStr = ticket.tanggal_keluar + 'T' + (ticket.waktu_keluar || '00:00');
                const waktuKeluar = new Date(tglKeluarStr);
                
                // ==========================================
                // SKENARIO 1: KATEGORI PRIBADI (Sisa 20 Menit)
                // ==========================================
                if (ticket.keperluan && ticket.keperluan.toLowerCase().includes('pribadi')) {
                    if (ticket.waktu_kembali) {
                        const batasWaktu = new Date(ticket.tanggal_keluar + 'T' + ticket.waktu_kembali);
                        const sisaMenit = Math.floor((batasWaktu - now) / 60000); // Konversi milidetik ke menit
                        
                        // Jika sisa waktu <= 20 menit dan belum pernah dikirim
                        if (sisaMenit <= 20 && sisaMenit > 0 && !localStorage.getItem(`notif_pribadi_${ticket.id}`)) {
                            kirimNotifikasi("Peringatan: Waktu izin keluar Anda hampir habis! Harap segera kembali.");
                            localStorage.setItem(`notif_pribadi_${ticket.id}`, 'sent');
                        }
                    }
                }
                
                // ==========================================
                // SKENARIO 2: KATEGORI DINAS (17:30 & 24 Jam)
                // ==========================================
                else if (ticket.keperluan && ticket.keperluan.toLowerCase().includes('dinas')) {
                    
                    // Trigger A: Pukul 17:30 WIB
                    if (now.getHours() === 17 && now.getMinutes() >= 30 && !localStorage.getItem(`notif_1730_${ticket.id}`)) {
                        kirimNotifikasi("Jam Operasional Sekolah akan segera berakhir! Jangan lupa lapor kembali.");
                        localStorage.setItem(`notif_1730_${ticket.id}`, 'sent');
                    }
                    
                    // Trigger B: 24 Jam (1.440 Menit dari jam keberangkatan)
                    const selisihMenit = Math.floor((now - waktuKeluar) / 60000);
                    if (selisihMenit >= 1440 && !localStorage.getItem(`notif_24j_${ticket.id}`)) {
                        kirimNotifikasi("Harap selesaikan izin keluar!");
                        localStorage.setItem(`notif_24j_${ticket.id}`, 'sent');
                    }
                }
                
            } catch (err) {
                console.log("PWA Background Checker Error:", err);
            }
        }

        // 3. Jembatan Pengiriman Pesan ke Service Worker
        function kirimNotifikasi(pesan) {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.ready.then(function(registration) {
                    registration.showNotification('LinkPermit Pro', {
                        body: pesan,
                        icon: 'https://cdn-icons-png.flaticon.com/512/1162/1162456.png',
                        badge: 'https://cdn-icons-png.flaticon.com/512/1162/1162456.png',
                        vibrate: [200, 100, 200, 100, 200, 100, 200], // Pola getar SOS
                        tag: 'peringatan-izin',
                        renotify: true
                    });
                });
            }
        }
    </script>
</body>
</html>
