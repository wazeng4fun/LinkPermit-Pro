<script>
        // --- KONFIGURASI ---
        const SB_URL = "https://isgzhypglpxjirjrnvnf.supabase.co";
        const SB_KEY = "sb_publishable_r5PbD3I5xBPwFCOpoOvnSg_gY8e3nIx";
        let supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

        let state = {
            activeTab: 'layanan', 
            adminActiveTab: 'pegawai', 
            dataIzin: [], 
            listPegawai: [], 
            listPetugas: [],
            currentUser: null, 
            isAdmin: false, 
            currentFinishId: null, 
            cameraStream: null
        };

        // --- NAVIGASI (Ditaruh di atas agar terbaca duluan) ---
        function navTo(tab) {
            console.log("Navigasi ke:", tab);
            ['layanan', 'piket', 'admin'].forEach(t => {
                const sec = document.getElementById(`sec-${t}`);
                const nav = document.getElementById(`nav-${t}`);
                if(sec) sec.classList.add('hidden');
                if(nav) nav.classList.replace('text-red-600', 'text-slate-400');
            });
            
            const targetSec = document.getElementById(`sec-${tab}`);
            const targetNav = document.getElementById(`nav-${tab}`);
            if(targetSec) targetSec.classList.remove('hidden');
            if(targetNav) targetNav.classList.replace('text-slate-400', 'text-red-600');
            state.activeTab = tab;
        }

        // --- INISIALISASI ---
        async function init() {
            showLoading("Memuat data...");
            try {
                await Promise.all([fetchPegawai(), fetchPetugas(), fetchIzin()]);
            } catch (err) {
                console.error("Init Error:", err);
            }
            hideLoading();
            updateTime();
            setInterval(updateTime, 1000);
        }

        async function fetchPegawai() {
            const { data, error } = await supabaseClient.from('pegawai').select('*').order('nama', { ascending: true });
            if (!error) { state.listPegawai = data || []; syncSelects(); }
        }

        async function fetchPetugas() {
            const { data, error } = await supabaseClient.from('petugas').select('*').order('nama', { ascending: true });
            if (!error) { state.listPetugas = data || []; syncSelects(); }
        }

        async function fetchIzin() {
            const { data, error } = await supabaseClient.from('izin').select('*').neq('status', 'Selesai').order('created_at', { ascending: false });
            if (!error) {
                state.dataIzin = data || [];
                renderUserList();
                renderPiketAntrean();
            }
        }

        // --- HANDLERS ---
        async function handleIzinSubmit(e) {
            if(e) e.preventDefault();
            const idx = document.getElementById('inputNama').value;
            if(!idx) return alert("Pilih Nama!");
            
            showLoading("Mengirim...");
            const peg = state.listPegawai[idx];
            const now = new Date();
            const { error } = await supabaseClient.from('izin').insert([{
                id_izin: 'LP-' + Math.floor(1000 + Math.random() * 9000),
                nama: peg.nama,
                keperluan: document.getElementById('inputKategori').value,
                tujuan: document.getElementById('inputTujuan').value,
                status: 'Menunggu',
                waktu_daftar: now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}).replace('.',':'),
                tanggal: now.toLocaleDateString('id-ID')
            }]);

            if(!error) {
                document.getElementById('inputTujuan').value = "";
                await fetchIzin();
                alert("Permohonan Terkirim!");
            }
            hideLoading();
        }

        async function approveIzin(id) {
            showLoading("Menyetujui...");
            const now = new Date();
            const { error } = await supabaseClient.from('izin').update({
                status: 'Keluar',
                waktu_keluar: now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}).replace('.',':'),
                tanggal_keluar: now.toLocaleDateString('id-ID')
            }).eq('id_izin', id);

            if(!error) await fetchIzin();
            hideLoading();
        }

        // --- LOGIN & ADMIN ---
        function handleLogin() {
            const user = document.getElementById('piketUser').value;
            const pin = document.getElementById('piketPin').value;
            const match = state.listPetugas.find(p => p.nama === user && p.pin === pin);
            if(match) {
                state.currentUser = match;
                document.getElementById('piketLogin').classList.add('hidden');
                document.getElementById('piketDashboard').classList.remove('hidden');
                document.getElementById('petugasAktif').textContent = match.nama;
            } else { alert("PIN Salah!"); }
        }

        function handleAdminLogin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === 'lm9595') {
                state.isAdmin = true;
                document.getElementById('adminLogin').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
            } else { alert("Password Admin Salah!"); }
        }

        function handleLogout() { location.reload(); }

        // --- UI RENDERERS ---
        function renderUserList() {
            const container = document.getElementById('listAntrean');
            if(!container) return;
            container.innerHTML = '';
            state.dataIzin.forEach(item => {
                const isOut = item.status === 'Keluar';
                container.innerHTML += `
                    <div class="p-5 border border-slate-100 bg-white rounded-3xl flex justify-between items-center shadow-sm">
                        <div class="truncate pr-4">
                            <div class="text-xs font-black uppercase">${item.nama}</div>
                            <div class="text-[8px] font-bold text-slate-400 uppercase">${item.keperluan}: ${item.tujuan}</div>
                        </div>
                        ${isOut ? 
                            `<button onclick="openFinish('${item.id_izin}')" class="px-4 py-2 bg-red-700 text-white rounded-xl text-[8px] font-black uppercase">Lapor</button>` : 
                            `<span class="text-[7px] font-black uppercase px-2 py-1 bg-amber-50 text-amber-600 rounded">Menunggu</span>`}
                    </div>`;
            });
        }

        function renderPiketAntrean() {
            const container = document.getElementById('antreanPiket');
            if(!container) return;
            const waiting = state.dataIzin.filter(i => i.status === 'Menunggu');
            container.innerHTML = waiting.length === 0 ? '<div class="text-center py-10 text-slate-300 uppercase text-[9px] font-black">Kosong</div>' : '';
            waiting.forEach(item => {
                container.innerHTML += `
                    <div class="p-5 bg-white border border-slate-200 rounded-3xl space-y-3">
                        <div class="text-sm font-black uppercase">${item.nama}</div>
                        <p class="text-[8px] font-bold text-slate-400 uppercase">Tujuan: ${item.tujuan}</p>
                        <button onclick="approveIzin('${item.id_izin}')" class="w-full py-3 bg-slate-900 text-white rounded-xl text-[9px] font-black uppercase">Izinkan Keluar</button>
                    </div>`;
            });
        }

        function syncSelects() {
            const sP = document.getElementById('inputNama');
            const sT = document.getElementById('piketUser');
            if(sP) {
                sP.innerHTML = '<option value="">Pilih Pegawai...</option>';
                state.listPegawai.forEach((p, i) => sP.innerHTML += `<option value="${i}">${p.nama}</option>`);
            }
            if(sT) {
                sT.innerHTML = '<option value="">Pilih Petugas...</option>';
                state.listPetugas.forEach(p => sT.innerHTML += `<option value="${p.nama}">${p.nama}</option>`);
            }
        }

        function updateTime() {
            const now = new Date();
            const cd = document.getElementById('clockDisplay');
            const dd = document.getElementById('dateDisplay');
            if(cd) cd.textContent = now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}).replace('.', ':');
            if(dd) dd.textContent = now.toLocaleDateString('id-ID', {weekday:'short', day:'numeric', month:'short'}).toUpperCase();
        }

        function showLoading(txt) { 
            const el = document.getElementById('loadingText');
            if (el) el.textContent = txt; 
            document.getElementById('loadingOverlay').classList.remove('hidden'); 
        }
        function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }

        // Camera functions...
        function openFinish(id) { state.currentFinishId = id; document.getElementById('modalFinish').classList.remove('hidden'); }
        function closeFinishModal() { document.getElementById('modalFinish').classList.add('hidden'); }

        window.onload = init;
        document.getElementById('izinForm').onsubmit = handleIzinSubmit;
    </script>
