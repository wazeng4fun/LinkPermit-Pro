<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinkPermit Pro</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="text-slate-900">

    <div id="loadingOverlay" class="fixed inset-0 z-[9999] bg-white/90 flex flex-col items-center justify-center hidden">
        <div class="w-10 h-10 border-4 border-slate-100 border-t-red-600 rounded-full animate-spin mb-4"></div>
        <p id="loadingText" class="text-[10px] font-black uppercase text-slate-400">Memproses...</p>
    </div>

    <div id="authOverlay" class="fixed inset-0 z-[2000] bg-white hidden overflow-y-auto animate-slide-up p-8">
        <div class="max-w-md mx-auto">
            <button onclick="closeAuth()" class="mb-8 text-slate-400"><i class="fas fa-arrow-left text-xl"></i></button>
            <h2 id="authTitle" class="text-2xl font-black uppercase italic mb-8">Piket <span class="text-red-700">Access</span></h2>
            
            <div id="authTabs" class="flex bg-slate-100 p-1 rounded-2xl mb-8">
                <button id="tabLogin" onclick="toggleAuthTab('login')" class="flex-1 py-3 text-[10px] font-black uppercase rounded-xl bg-white shadow-sm">Login</button>
                <button id="tabDaftar" onclick="toggleAuthTab('daftar')" class="flex-1 py-3 text-[10px] font-black uppercase text-slate-400">Daftar</button>
            </div>

            <div id="boxLogin" class="space-y-4">
                <select id="loginNama" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm"></select>
                <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm">
                <button onclick="handleLoginPiket()" class="w-full bg-red-700 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl">Masuk</button>
                <button onclick="switchAdminUI()" class="w-full text-[9px] font-black uppercase text-red-700">Login Admin</button>
            </div>

            <div id="boxDaftar" class="hidden space-y-4">
                <select id="regNama" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm"></select>
                <input type="email" id="regEmail" placeholder="Email" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm">
                <input type="password" id="regPass" placeholder="Password" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm">
                <button onclick="handleRegisterPiket()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl">Daftar</button>
            </div>

            <div id="boxAdmin" class="hidden space-y-4">
                <input type="email" id="adminEmail" placeholder="Email Admin" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm">
                <input type="password" id="adminPass" placeholder="Password Admin" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm">
                <button onclick="handleLoginAdmin()" class="w-full bg-red-700 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl">Login Admin</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t z-[1000] px-6 py-4 shadow-lg">
        <div class="max-w-md mx-auto flex justify-around">
            <button onclick="navTo('layanan')" id="nav-layanan" class="flex flex-col items-center gap-1 text-red-600">
                <i class="fas fa-home text-lg"></i><span class="text-[9px] font-black uppercase">Layanan</span>
            </button>
            <button onclick="navTo('piket')" id="nav-piket" class="flex flex-col items-center gap-1 text-slate-400">
                <i class="fas fa-user-shield text-lg"></i><span class="text-[9px] font-black uppercase">Piket</span>
            </button>
            <button onclick="navTo('admin')" id="nav-admin" class="flex flex-col items-center gap-1 text-slate-400">
                <i class="fas fa-cog text-lg"></i><span class="text-[9px] font-black uppercase">Admin</span>
            </button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-6 pb-32">
        <div id="sec-layanan" class="animate-slide-up space-y-6">
            <h1 class="text-xl font-black italic">Form Izin Keluar</h1>
            <form id="izinForm" class="space-y-4">
                <select id="inputNama" required class="w-full p-4 border rounded-2xl font-bold text-sm"></select>
                <input id="inputTujuan" type="text" placeholder="Keperluan" required class="w-full p-4 border rounded-2xl font-bold text-sm">
                <button type="submit" class="w-full bg-red-700 text-white py-4 rounded-2xl font-black text-[10px] uppercase">Kirim Izin</button>
            </form>
        </div>

        <div id="sec-piket" class="hidden animate-slide-up space-y-4">
            <h2 class="font-black uppercase text-sm border-l-4 border-red-700 pl-2">Antrean Izin</h2>
            <div id="listPiket" class="space-y-3"></div>
        </div>

        <div id="sec-admin" class="hidden animate-slide-up space-y-4">
            <h2 class="font-black uppercase text-sm">Persetujuan Akun Piket</h2>
            <div id="listApprovePiket" class="space-y-3"></div>
        </div>
    </main>

    <script>
        const SB_URL = "https://isgzhypglpxjirjrnvnf.supabase.co";
        const SB_KEY = "MASUKKAN_KEY_ANDA_DISINI"; // Pastikan diisi!
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let currentSession = null;

        // FUNGSI NAVIGASI (DIPERBAIKI AGAR TIDAK FREEZE)
        function navTo(section) {
            console.log("Navigasi ke:", section);
            if (section === 'layanan') {
                renderSection(section);
            } else if (!currentSession) {
                showAuth();
            } else {
                renderSection(section);
            }
        }

        function renderSection(section) {
            ['layanan', 'piket', 'admin'].forEach(s => {
                document.getElementById(`sec-${s}`).classList.add('hidden');
                document.getElementById(`nav-${s}`).classList.replace('text-red-600', 'text-slate-400');
            });
            document.getElementById(`sec-${section}`).classList.remove('hidden');
            document.getElementById(`nav-${section}`).classList.replace('text-slate-400', 'text-red-600');
            
            if (section === 'piket') loadDataIzin();
            if (section === 'admin') loadPendaftaranPiket();
        }

        function showAuth() { document.getElementById('authOverlay').classList.remove('hidden'); fetchMasterPiket(); }
        function closeAuth() { document.getElementById('authOverlay').classList.add('hidden'); }

        // AMBIL DATA DENGAN TRY-CATCH (ANTI-FREEZE)
        async function fetchInitialData() {
            try {
                const { data } = await supabase.from('data_pegawai').select('nama').order('nama');
                const sel = document.getElementById('inputNama');
                sel.innerHTML = '<option value="">Pilih Nama Pegawai...</option>';
                data?.forEach(p => sel.innerHTML += `<option value="${p.nama}">${p.nama}</option>`);
            } catch (e) { console.error("Gagal muat pegawai:", e); }
        }

        async function fetchMasterPiket() {
            try {
                const { data } = await supabase.from('master_piket').select('nama_piket');
                const sels = [document.getElementById('loginNama'), document.getElementById('regNama')];
                sels.forEach(s => {
                    s.innerHTML = '<option value="">Pilih Nama...</option>';
                    data?.forEach(p => s.innerHTML += `<option value="${p.nama_piket}">${p.nama_piket}</option>`);
                });
            } catch (e) { console.error("Gagal muat master piket:", e); }
        }

        // LOGIN PIKET
        async function handleLoginPiket() {
            const nama = document.getElementById('loginNama').value;
            const pass = document.getElementById('loginPass').value;
            showLoading("Mengecek...");
            const { data } = await supabase.from('users_piket').select('*').eq('nama_piket', nama).eq('password', pass).single();
            hideLoading();
            if (data?.is_approved) {
                currentSession = { nama: data.nama_piket, role: 'piket' };
                closeAuth();
                navTo('piket');
            } else {
                alert(data ? "Akun belum disetujui Admin" : "Login Gagal");
            }
        }

        // FUNGSI LAIN (LOADING)
        function showLoading(t) { document.getElementById('loadingText').innerText = t; document.getElementById('loadingOverlay').classList.remove('hidden'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }

        window.onload = fetchInitialData;
    </script>
</body>
</html>
