<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinkPermit Pro</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1162/1162456.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .hide-scroll::-webkit-scrollbar { display: none; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        input:focus, select:focus { border-color: #b91c1c !important; }
    </style>
</head>
<body class="text-slate-900 antialiased">

    <div id="loadingOverlay" class="fixed inset-0 z-[9999] bg-white/95 backdrop-blur-md hidden flex flex-col items-center justify-center">
        <div class="w-10 h-10 border-4 border-slate-100 border-t-red-600 rounded-full animate-spin mb-4"></div>
        <p id="loadingText" class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-400">Sinkronisasi Data</p>
    </div>

    <div id="authOverlay" class="fixed inset-0 z-[2000] bg-white hidden overflow-y-auto animate-slide-up p-8">
        <div class="max-w-md mx-auto">
            <button onclick="closeAuth()" class="mb-8 text-slate-400 hover:text-red-700 transition-colors">
                <i class="fas fa-arrow-left text-xl"></i>
            </button>
            
            <div id="authHeader" class="text-center mb-8">
                <h2 id="authTitle" class="text-2xl font-black uppercase italic tracking-tighter">Akses <span class="text-red-700">Piket</span></h2>
                <p id="authSub" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-2">Silakan login untuk bertugas</p>
            </div>

            <div id="authTabs" class="flex bg-slate-100 p-1 rounded-2xl mb-8">
                <button id="tabLogin" onclick="toggleAuthTab('login')" class="flex-1 py-3 text-[10px] font-black uppercase rounded-xl bg-white shadow-sm transition-all">Login</button>
                <button id="tabDaftar" onclick="toggleAuthTab('daftar')" class="flex-1 py-3 text-[10px] font-black uppercase text-slate-400 transition-all">Daftar</button>
            </div>

            <div id="boxLogin" class="space-y-4">
                <div class="space-y-2">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest px-1">Pilih Nama</label>
                    <select id="loginNama" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-sm outline-none transition-all text-slate-700"></select>
                </div>
                <div class="space-y-2">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest px-1">Password</label>
                    <input type="password" id="loginPass" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-sm outline-none transition-all">
                </div>
                <button onclick="handleLoginPiket()" class="w-full bg-red-700 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl active:scale-95 transition-all">Masuk Bertugas</button>
                <div class="flex justify-between px-2 pt-2">
                    <button onclick="resetPassword()" class="text-[9px] font-black uppercase text-slate-400">Lupa Password?</button>
                    <button onclick="switchAdminUI()" class="text-[9px] font-black uppercase text-red-700">Akses Admin</button>
                </div>
            </div>

            <div id="boxDaftar" class="hidden space-y-4">
                <select id="regNama" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-sm outline-none text-slate-700"></select>
                <input type="email" id="regEmail" placeholder="Email (untuk reset)" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-sm outline-none">
                <input type="number" id="regWA" placeholder="Nomor WhatsApp" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-sm outline-none">
                <input type="password" id="regPass" placeholder="Buat Password" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-sm outline-none">
                <button onclick="handleRegisterPiket()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl active:scale-95 transition-all">Ajukan Pendaftaran</button>
            </div>

            <div id="boxAdmin" class="hidden space-y-4">
                <input type="email" id="adminEmail" placeholder="Email Admin" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-sm outline-none">
                <input type="password" id="adminPass" placeholder="Password Admin" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-sm outline-none">
                <button onclick="handleLoginAdmin()" class="w-full bg-red-700 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl active:scale-95 transition-all">Login Administrator</button>
                <button onclick="switchAdminUI()" class="w-full text-[9px] font-black uppercase text-slate-400 py-2">Kembali ke Piket</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 z-[1000] px-4 py-2 safe-area-bottom shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto flex justify-around items-center">
            <button onclick="navTo('layanan')" id="nav-layanan" class="flex flex-col items-center gap-1 p-2 text-red-600">
                <i class="fas fa-home-alt text-lg"></i>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Beranda</span>
            </button>
            <button onclick="navTo('piket')" id="nav-piket" class="flex flex-col items-center gap-1 p-2 text-slate-400">
                <i class="fas fa-user-shield text-lg"></i>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Piket</span>
            </button>
            <button onclick="navTo('admin')" id="nav-admin" class="flex flex-col items-center gap-1 p-2 text-slate-400">
                <i class="fas fa-cog text-lg"></i>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Admin</span>
            </button>
        </div>
    </nav>

    <header class="sticky top-0 bg-white/80 backdrop-blur-md z-[900] px-6 py-4 border-b border-slate-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-red-700 rounded-lg flex items-center justify-center text-white shadow-lg shadow-red-700/20">
                    <i class="fas fa-id-card text-xs"></i>
                </div>
                <h1 class="text-sm font-black tracking-tighter uppercase">LinkPermit <span class="text-red-700">Pro</span></h1>
            </div>
            <div class="text-right">
                <div id="clockDisplay" class="text-xs font-black">00:00</div>
                <div id="dateDisplay" class="text-[7px] font-bold text-slate-400 uppercase tracking-widest">LOADING...</div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-5 pb-24">
        <div id="sec-layanan" class="animate-slide-up space-y-6">
            <div class="bg-slate-900 rounded-[2rem] p-6 text-white relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-lg font-black leading-tight mb-1">Pengajuan Izin</h2>
                    <p class="text-[9px] font-medium text-slate-400 uppercase tracking-widest">SMK Link and Match</p>
                </div>
                <i class="fas fa-cloud absolute -right-2 -bottom-2 text-6xl text-white/5"></i>
            </div>

            <form id="izinForm" class="space-y-4">
                <div class="space-y-2">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest px-1">Nama Pegawai</label>
                    <select id="inputNama" required class="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-sm shadow-sm outline-none focus:border-red-600 transition-all text-slate-700">
                        <option value="">Memuat data pegawai...</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest px-1">Kategori</label>
                        <select id="inputKategori" required class="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-sm shadow-sm outline-none text-slate-700">
                            <option value="Dinas/Sekolah">Dinas/Sekolah</option>
                            <option value="Pribadi">Pribadi</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest px-1">Keperluan</label>
                        <input id="inputTujuan" type="text" placeholder="..." required class="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-sm shadow-sm outline-none text-slate-700">
                    </div>
                </div>
                <button type="submit" class="w-full bg-red-700 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl active:scale-95 transition-all">
                    Kirim Permohonan <i class="fas fa-paper-plane ml-2"></i>
                </button>
            </form>
        </div>

        <div id="sec-piket" class="hidden animate-slide-up space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-sm font-black uppercase tracking-widest border-l-4 border-red-700 pl-3">Daftar Antrean</h2>
                <button onclick="logout()" class="text-[9px] font-black text-red-700 uppercase">Keluar</button>
            </div>
            <div id="listPiket" class="space-y-4">
                </div>
        </div>

        <div id="sec-admin" class="hidden animate-slide-up space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-sm font-black uppercase tracking-widest border-l-4 border-red-700 pl-3">Panel Admin</h2>
                <button onclick="logout()" class="text-[9px] font-black text-red-700 uppercase">Keluar</button>
            </div>
            
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                <h3 class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Persetujuan Petugas Baru</h3>
                <div id="listApprove" class="space-y-3">
                    </div>
            </div>
        </div>
    </main>

    <script>
        // --- KONFIGURASI ---
        const SB_URL = "https://isgzhypglpxjirjrnvnf.supabase.co";
        const SB_KEY = "sb_publishable_r5PbD3I5xBPwFCOpoOvnSg_gY8e3nIx";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let currentSession = null; // { nama, role }

        // --- NAVIGASI & AUTH CHECK ---
        function navTo(section) {
            if (section === 'layanan') {
                renderSection(section);
                return;
            }

            if (!currentSession) {
                showAuth();
            } else {
                if (section === 'admin' && currentSession.role !== 'admin') {
                    alert("Hanya Admin yang diizinkan!");
                    return;
                }
                renderSection(section);
            }
        }

        function renderSection(section) {
            ['layanan', 'piket', 'admin'].forEach(s => {
                const sec = document.getElementById(`sec-${s}`);
                const nav = document.getElementById(`nav-${s}`);
                if(sec) sec.classList.add('hidden');
                if(nav) nav.classList.replace('text-red-600', 'text-slate-400');
            });
            document.getElementById(`sec-${section}`).classList.remove('hidden');
            document.getElementById(`nav-${section}`).classList.replace('text-slate-400', 'text-red-600');
            
            if (section === 'piket') fetchDataIzin();
            if (section === 'admin') fetchPendaftarPiket();
        }

        // --- AUTH LOGIC ---
        function showAuth() {
            document.getElementById('authOverlay').classList.remove('hidden');
            fetchMasterPiket();
        }

        function closeAuth() {
            document.getElementById('authOverlay').classList.add('hidden');
        }

        function toggleAuthTab(type) {
            const isLogin = type === 'login';
            document.getElementById('boxLogin').classList.toggle('hidden', !isLogin);
            document.getElementById('boxDaftar').classList.toggle('hidden', isLogin);
            document.getElementById('tabLogin').classList.toggle('bg-white', isLogin);
            document.getElementById('tabLogin').classList.toggle('shadow-sm', isLogin);
            document.getElementById('tabDaftar').classList.toggle('bg-white', !isLogin);
            document.getElementById('tabDaftar').classList.toggle('shadow-sm', !isLogin);
        }

        function switchAdminUI() {
            const isHidden = document.getElementById('boxAdmin').classList.toggle('hidden');
            document.getElementById('boxLogin').classList.toggle('hidden', !isHidden);
            document.getElementById('authTabs').classList.toggle('hidden', !isHidden);
            document.getElementById('authTitle').innerHTML = isHidden ? 'Akses <span class="text-red-700">Piket</span>' : 'Akses <span class="text-red-700">Admin</span>';
        }

        async function fetchMasterPiket() {
            const { data } = await supabase.from('master_piket').select('nama_piket').order('nama_piket');
            const sels = [document.getElementById('loginNama'), document.getElementById('regNama')];
            sels.forEach(s => {
                s.innerHTML = '<option value="">Pilih Nama...</option>';
                data?.forEach(p => s.innerHTML += `<option value="${p.nama_piket}">${p.nama_piket}</option>`);
            });
        }

        async function handleRegisterPiket() {
            const nama = document.getElementById('regNama').value;
            const email = document.getElementById('regEmail').value;
            const wa = document.getElementById('regWA').value;
            const pass = document.getElementById('regPass').value;

            if(!nama || !email || !pass) return alert("Lengkapi semua kolom!");

            showLoading("Mengirim pendaftaran...");
            const { error } = await supabase.from('users_piket').insert([
                { nama_piket: nama, email, whatsapp: wa, password: pass, is_approved: false }
            ]);

            hideLoading();
            if (error) alert("Gagal daftar: " + error.message);
            else {
                alert("Pendaftaran berhasil! Tunggu persetujuan Admin.");
                toggleAuthTab('login');
            }
        }

        async function handleLoginPiket() {
            const nama = document.getElementById('loginNama').value;
            const pass = document.getElementById('loginPass').value;

            showLoading("Memverifikasi...");
            const { data } = await supabase.from('users_piket')
                .select('*').eq('nama_piket', nama).eq('password', pass).single();

            hideLoading();
            if (data) {
                if (data.is_approved) {
                    currentSession = { nama: data.nama_piket, role: 'piket' };
                    closeAuth();
                    navTo('piket');
                } else alert("Akun Anda belum disetujui Admin.");
            } else alert("Nama atau Password salah!");
        }

        async function handleLoginAdmin() {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;

            showLoading("Login Admin...");
            const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });

            hideLoading();
            if (data.user) {
                currentSession = { nama: 'Admin', role: 'admin' };
                closeAuth();
                navTo('admin');
            } else alert("Login Gagal: " + error.message);
        }

        function logout() {
            currentSession = null;
            navTo('layanan');
        }

        function resetPassword() {
            alert("Silakan hubungi Administrator untuk melakukan reset password akun Piket Anda.");
        }

        // --- DATA LOGIC ---
        async function fetchDataIzin() {
            const { data } = await supabase.from('izin_keluar').select('*').order('created_at', {ascending: false});
            const list = document.getElementById('listPiket');
            list.innerHTML = '';
            data?.forEach(item => {
                list.innerHTML += `
                    <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm space-y-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-[8px] font-black uppercase text-slate-400 tracking-[0.2em] mb-1">${item.kategori}</p>
                                <h4 class="font-black text-sm text-slate-800">${item.nama}</h4>
                            </div>
                            <span class="text-[8px] font-black px-3 py-1.5 rounded-full ${item.status === 'Keluar' ? 'bg-red-50 text-red-600' : 'bg-slate-50 text-slate-400'} uppercase">
                                ${item.status}
                            </span>
                        </div>
                        <p class="text-[10px] font-medium text-slate-500 italic">" ${item.keperluan} "</p>
                        ${item.status === 'Pending' ? `
                            <button onclick="approveIzin('${item.id}')" class="w-full bg-slate-900 text-white py-3 rounded-2xl text-[9px] font-black uppercase tracking-widest">Setujui Keluar</button>
                        ` : `<p class="text-[8px] font-bold text-slate-300 uppercase tracking-widest">Disetujui: ${item.disetujui_oleh || 'System'}</p>`}
                    </div>`;
            });
        }

        async function approveIzin(id) {
            showLoading("Memproses...");
            await supabase.from('izin_keluar').update({ 
                status: 'Keluar', 
                disetujui_oleh: currentSession.nama 
            }).eq('id', id);
            fetchDataIzin();
            hideLoading();
        }

        async function fetchPendaftarPiket() {
            const { data } = await supabase.from('users_piket').select('*').eq('is_approved', false);
            const list = document.getElementById('listApprove');
            list.innerHTML = data?.length ? '' : '<p class="text-[9px] text-slate-400 italic">Tidak ada pendaftaran baru.</p>';
            data?.forEach(p => {
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl">
                        <div>
                            <p class="text-[10px] font-black">${p.nama_piket}</p>
                            <p class="text-[8px] text-slate
