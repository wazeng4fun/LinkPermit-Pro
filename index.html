<div id="authOverlay" class="fixed inset-0 z-[2000] bg-slate-900 flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl animate-slide-up">
        <div class="text-center mb-8">
            <h2 id="authTitle" class="text-2xl font-black tracking-tighter uppercase">Login <span class="text-red-700">Piket</span></h2>
            <p id="authSub" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">Silakan masuk untuk bertugas</p>
        </div>

        <div id="formLoginPiket" class="space-y-4">
            <select id="loginPiketNama" class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-sm outline-none ring-2 ring-transparent focus:ring-red-600 transition-all">
                <option value="">Pilih Nama Anda...</option>
            </select>
            <input type="password" id="loginPiketPass" placeholder="Password" class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-sm outline-none ring-2 ring-transparent focus:ring-red-600 transition-all">
            <button onclick="handleLoginPiket()" class="w-full bg-red-700 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg active:scale-95 transition-all">Masuk Piket</button>
            <div class="flex justify-between px-2">
                <button onclick="switchAuth('regPiket')" class="text-[9px] font-black uppercase text-slate-400 hover:text-red-700">Daftar Akun</button>
                <button onclick="switchAuth('loginAdmin')" class="text-[9px] font-black uppercase text-slate-400 hover:text-red-700">Login Admin</button>
            </div>
        </div>

        <div id="formRegPiket" class="hidden space-y-4">
            <select id="regPiketNama" class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-sm outline-none ring-2 ring-transparent focus:ring-red-600 transition-all">
                <option value="">Pilih Nama (Dari Admin)...</option>
            </select>
            <input type="email" id="regPiketEmail" placeholder="Email" class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-sm outline-none ring-2 ring-transparent focus:ring-red-600 transition-all">
            <input type="number" id="regPiketWA" placeholder="Nomor WhatsApp" class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-sm outline-none ring-2 ring-transparent focus:ring-red-600 transition-all">
            <input type="password" id="regPiketPass" placeholder="Buat Password" class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-sm outline-none ring-2 ring-transparent focus:ring-red-600 transition-all">
            <button onclick="handleRegisterPiket()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg active:scale-95 transition-all">Ajukan Pendaftaran</button>
            <button onclick="switchAuth('loginPiket')" class="w-full text-[9px] font-black uppercase text-slate-400">Kembali ke Login</button>
        </div>

        <div id="formLoginAdmin" class="hidden space-y-4">
            <input type="email" id="adminEmail" placeholder="Email Admin" class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-sm outline-none ring-2 ring-transparent focus:ring-red-600 transition-all">
            <input type="password" id="adminPass" placeholder="Password Admin" class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-sm outline-none ring-2 ring-transparent focus:ring-red-600 transition-all">
            <button onclick="handleLoginAdmin()" class="w-full bg-red-700 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg active:scale-95 transition-all">Login Administrator</button>
            <button onclick="switchAuth('loginPiket')" class="w-full text-[9px] font-black uppercase text-slate-400">Login sebagai Piket</button>
        </div>
    </div>
</div>

<script>
    // --- STATE KEAMANAN ---
    let currentUser = null; // Menyimpan data siapa yang login (Admin atau Nama Piket)
    let userRole = null; // 'admin' atau 'piket'

    // 1. Fungsi Switch Tampilan Auth
    function switchAuth(type) {
        document.getElementById('formLoginPiket').classList.add('hidden');
        document.getElementById('formRegPiket').classList.add('hidden');
        document.getElementById('formLoginAdmin').classList.add('hidden');
        
        if(type === 'loginPiket') {
            document.getElementById('formLoginPiket').classList.remove('hidden');
            document.getElementById('authTitle').innerHTML = 'Login <span class="text-red-700">Piket</span>';
        } else if(type === 'regPiket') {
            document.getElementById('formRegPiket').classList.remove('hidden');
            document.getElementById('authTitle').innerHTML = 'Daftar <span class="text-red-700">Piket</span>';
        } else if(type === 'loginAdmin') {
            document.getElementById('formLoginAdmin').classList.remove('hidden');
            document.getElementById('authTitle').innerHTML = 'Login <span class="text-red-700">Admin</span>';
        }
    }

    // 2. Fungsi Login Admin (Menggunakan Supabase Auth)
    async function handleLoginAdmin() {
        const email = document.getElementById('adminEmail').value;
        const pass = document.getElementById('adminPass').value;
        
        showLoading("Verifikasi Admin...");
        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: pass
        });

        if (error) {
            alert("Login Admin Gagal: " + error.message);
        } else {
            currentUser = "Administrator";
            userRole = "admin";
            document.getElementById('authOverlay').classList.add('hidden');
            navTo('admin'); // Langsung ke menu admin
        }
        hideLoading();
    }

    // 3. Fungsi Registrasi Piket (Simpan ke tabel users_piket dengan status is_approved = false)
    async function handleRegisterPiket() {
        const nama = document.getElementById('regPiketNama').value;
        const email = document.getElementById('regPiketEmail').value;
        const wa = document.getElementById('regPiketWA').value;
        const pass = document.getElementById('regPiketPass').value;

        if(!nama || !email || !pass) return alert("Lengkapi data!");

        showLoading("Mengirim Pendaftaran...");
        const { error } = await supabaseClient.from('users_piket').insert([
            { nama_piket: nama, email: email, whatsapp: wa, password: pass, is_approved: false }
        ]);

        if (error) {
            alert("Gagal Daftar: " + error.message);
        } else {
            alert("Pendaftaran Berhasil! Silakan hubungi Admin untuk persetujuan akun Anda.");
            switchAuth('loginPiket');
        }
        hideLoading();
    }

    // 4. Fungsi Login Piket (Cek ke tabel users_piket & is_approved)
    async function handleLoginPiket() {
        const nama = document.getElementById('loginPiketNama').value;
        const pass = document.getElementById('loginPiketPass').value;

        showLoading("Mengecek Akun...");
        const { data, error } = await supabaseClient
            .from('users_piket')
            .select('*')
            .eq('nama_piket', nama)
            .eq('password', pass)
            .single();

        if (data) {
            if (data.is_approved) {
                currentUser = data.nama_piket;
                userRole = "piket";
                document.getElementById('authOverlay').classList.add('hidden');
                navTo('piket');
            } else {
                alert("Akun Anda belum disetujui oleh Admin.");
            }
        } else {
            alert("Nama atau Password salah.");
        }
        hideLoading();
    }

    // 5. Fitur Persetujuan (Hanya muncul di menu Admin)
    async function setujuiPiket(id) {
        showLoading("Menyetujui...");
        await supabaseClient.from('users_piket').update({ is_approved: true }).eq('id', id);
        alert("Petugas telah disetujui!");
        // Refresh data pendaftaran di UI Admin
        hideLoading();
    }

    // 6. Audit Trail saat Menyetujui Izin Keluar
    async function approveIzin(idTiket) {
        // Saat piket menyetujui izin keluar
        const { error } = await supabaseClient
            .from('izin_keluar')
            .update({ 
                status: 'Keluar', 
                disetujui_oleh: currentUser // Mencatat siapa yang klik setuju
            })
            .eq('id', idTiket);
        
        if(!error) alert(`Izin disetujui oleh ${currentUser}`);
    }
</script>
